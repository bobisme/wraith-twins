schema_version = 1

[service]
name = "linear"
base_url = "https://api.linear.app"
user_agent = "wraith/0.1.9"

[proxy]
mode = "reverse"
port = 8083

[serve]
port = 8083
session_mode = "header"
fidelity = "synth"
deterministic_seed = 42
debug = false

[serve.latency]
mode = "none"
min_ms = 0
max_ms = 5000
multiplier = 1.0

[serve.limits]
max_entities_per_type = 10000
max_total_state_mb = 100
max_namespaces = 1000
request_drain_timeout_ms = 5000

[serve.rate_limits]

[diff]
required_score = 0.9
session_pass_rate = 0.95
scoring_version = 1
ignore_headers = []
split_variants = false

[diff.thresholds]
status_exact_match = true
body_structure = 0.9
body_values = 0.85
symbol_consistency = 1.0
header_conformance = 0.8

[diff.overrides]

[diff.fields]

[generate]
max_iterations = 10
token_budget = 200000
time_budget_minutes = 30
regression_tolerance = 0.0

[generate.symbolization]
entropy_threshold = 4.5
min_string_length = 4
exclude_urls = true
exclude_natural_language = true
field_name_hinting = true

[generate.anti_unification]
min_exchanges_per_route = 3
low_confidence_threshold = 0.2
array_mode = "schema"

[generate.route_normalization]
numeric_ids = true
prefix_pattern_ids = true
value_flow_confirmation = true
structural_alignment = false

[generate.guard_inference]
algorithm = "decision_tree"
max_depth = 4
z3_minimization = false

[generate.type_inference]
cross_route_unification = true
enum_max_values = 5
enum_min_samples = 3

[generate.routing]
fallback = []
air_gapped = false

[generate.runners]

[generate.llm]
provider = "ollama"
model = "qwen3.5:9b"
base_url = "http://localhost:11434"
timeout_seconds = 120
temperature = 0.2
max_tokens = 4096

[refresh]
sample_strategy = "risk_weighted"
budget_requests = 500

[recordings]
max_sessions = 1000
max_total_size_mb = 5000
retention_days = 90
max_body_size_mb = 10

[passthrough]
enabled = false
allow = []
