[defaults]
scrub_auth_headers = true
scrub_cookies = true
tokenize_mode = "hmac"

[[rules]]
scope = "header"
match = "authorization"
action = "tokenize"

[[rules]]
scope = "header"
match = "cookie"
action = "tokenize"

[[rules]]
scope = "header"
match = "x-api-key"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "api_key"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "secret"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "password"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "access_token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "refresh_token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "client_secret"
action = "tokenize"

# Linear API key format: lin_api_*
[[rules]]
scope = "regex"
match = 'lin_api_[0-9a-zA-Z]+'
action = "tokenize"

# Linear OAuth tokens
[[rules]]
scope = "regex"
match = 'lin_oauth_[0-9a-zA-Z]+'
action = "tokenize"
