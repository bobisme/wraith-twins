[defaults]
scrub_auth_headers = true
scrub_cookies = true
tokenize_mode = "hmac"

[[rules]]
scope = "header"
match = "authorization"
action = "tokenize"

[[rules]]
scope = "header"
match = "cookie"
action = "tokenize"

[[rules]]
scope = "header"
match = "x-api-key"
action = "tokenize"

# Supabase passes its API key in the apikey header
[[rules]]
scope = "header"
match = "apikey"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "api_key"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "secret"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "password"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "access_token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "refresh_token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "client_secret"
action = "tokenize"

# Supabase local service keys: sb_secret_* and sb_publishable_*
[[rules]]
scope = "regex"
match = 'sb_(secret|publishable)_[0-9a-zA-Z_\-]+'
action = "tokenize"

# Supabase cloud personal access tokens: sbp_*
[[rules]]
scope = "regex"
match = 'sbp_[0-9a-zA-Z]+'
action = "tokenize"

# JWT tokens (Supabase anon and service role keys are long-lived JWTs)
# Pattern: three base64url segments separated by dots, min 100 chars total
[[rules]]
scope = "regex"
match = 'eyJ[0-9a-zA-Z\-_]{20,}\.[0-9a-zA-Z\-_]{20,}\.[0-9a-zA-Z\-_]{20,}'
action = "tokenize"
