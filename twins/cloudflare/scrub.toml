[defaults]
scrub_auth_headers = true
scrub_cookies = true
tokenize_mode = "hmac"

[[rules]]
scope = "header"
match = "authorization"
action = "tokenize"

[[rules]]
scope = "header"
match = "cookie"
action = "tokenize"

[[rules]]
scope = "header"
match = "x-api-key"
action = "tokenize"

# Cloudflare Global API Key authentication headers
[[rules]]
scope = "header"
match = "x-auth-key"
action = "tokenize"

[[rules]]
scope = "header"
match = "x-auth-email"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "api_key"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "secret"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "password"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "access_token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "refresh_token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "client_secret"
action = "tokenize"

