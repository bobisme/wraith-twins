[defaults]
scrub_auth_headers = true
scrub_cookies = true
tokenize_mode = "hmac"

[[rules]]
scope = "header"
match = "authorization"
action = "tokenize"

[[rules]]
scope = "header"
match = "cookie"
action = "tokenize"

[[rules]]
scope = "header"
match = "x-api-key"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "api_key"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "secret"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "password"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "access_token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "refresh_token"
action = "tokenize"

[[rules]]
scope = "query_param"
match = "client_secret"
action = "tokenize"

# GitHub token formats: ghp_* (classic PAT), gho_* (OAuth), ghs_* (server), github_pat_* (fine-grained)
[[rules]]
scope = "regex"
match = 'ghp_[0-9a-zA-Z]{36}'
action = "tokenize"

[[rules]]
scope = "regex"
match = 'gho_[0-9a-zA-Z]{36}'
action = "tokenize"

[[rules]]
scope = "regex"
match = 'ghs_[0-9a-zA-Z]{36}'
action = "tokenize"

[[rules]]
scope = "regex"
match = 'ghr_[0-9a-zA-Z]{36}'
action = "tokenize"

[[rules]]
scope = "regex"
match = 'github_pat_[0-9a-zA-Z_]{82,}'
action = "tokenize"
